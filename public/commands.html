<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Generate ready-to-paste MCSR Ranked and Draftout chat bot commands." />
    <title>Chat Commands · MCSR Stats</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,500,0,0" />
    <style>
      :root { color-scheme: light; --bg: #f6f7f8; --panel: #fff; --soft: #f0f2f4; --code: #f6f7f8; --line: #d9dde2; --text: #20242a; --muted: #66717f; --accent: #237a57; --accent-text: #fff; --danger: #b42318; }
      :root[data-theme="dark"] { color-scheme: dark; --bg: #15181c; --panel: #1d2126; --soft: #282d33; --code: #171a1e; --line: #363c44; --text: #eef0f2; --muted: #a3abb5; --accent: #71c9a4; --accent-text: #10271e; --danger: #ff9b92; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; font: 16px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text); background: var(--bg); }
      button, input { font: inherit; }
      a { color: inherit; }
      .shell { width: min(1160px, calc(100% - 40px)); margin: 0 auto; padding: 28px 0 64px; }
      nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 56px; }
      .brand { text-decoration: none; font-weight: 700; }
      .brand span { color: var(--accent); }
      .nav-actions { display: flex; align-items: center; }
      .theme-toggle { display: inline-flex; align-items: center; gap: 7px; padding: 6px 10px; border: 1px solid var(--line); border-radius: 5px; color: var(--text); background: var(--panel); cursor: pointer; }
      .material-symbols-outlined { font-family: "Material Symbols Outlined"; font-size: 18px; font-weight: normal; font-style: normal; line-height: 1; letter-spacing: normal; text-transform: none; white-space: nowrap; word-wrap: normal; direction: ltr; font-feature-settings: "liga"; -webkit-font-smoothing: antialiased; }
      header { display: grid; grid-template-columns: minmax(0, 1fr) 420px; gap: 64px; align-items: end; margin-bottom: 44px; }
      .header-copy { max-width: 650px; }
      .eyebrow { color: var(--accent); font-size: .85rem; font-weight: 700; }
      h1 { margin: 8px 0 10px; font-size: clamp(2rem, 5vw, 3rem); line-height: 1.1; letter-spacing: -.03em; }
      header p { margin-bottom: 0; color: var(--muted); max-width: 620px; }
      .setup { padding: 18px; border: 1px solid var(--line); background: var(--panel); border-radius: 8px; }
      label { display: block; color: var(--muted); font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
      input { width: 100%; min-height: 44px; padding: 0 12px; color: var(--text); background: var(--bg); border: 1px solid var(--line); border-radius: 5px; outline: none; }
      input:focus { border-color: var(--accent); }
      .summary { display: flex; justify-content: space-between; align-items: end; margin: 0 0 24px; }
      .summary h2 { margin: 0; font-size: 1.25rem; }
      #count { color: var(--muted); font-size: .9rem; }
      .command-group { margin-bottom: 34px; }
      .group-heading { display: flex; align-items: baseline; gap: 8px; margin: 0 0 12px; font-size: 1.1rem; }
      .group-count { color: var(--muted); font-size: .78rem; font-weight: 400; }
      .grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
      .card { min-width: 0; display: grid; grid-template-columns: 190px minmax(0, 1fr) 280px; gap: 20px; align-items: start; padding: 16px; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; }
      .card-info, .card-command, .card-output { min-width: 0; }
      .card-output { display: flex; min-height: 100%; flex-direction: column; align-items: flex-start; }
      .card-top { display: flex; align-items: start; justify-content: space-between; gap: 16px; }
      h3 { margin: 0; font-size: 1.15rem; }
      .trigger { white-space: nowrap; color: var(--muted); background: var(--soft); padding: 4px 8px; border-radius: 4px; font: .75rem ui-monospace, SFMono-Regular, Menlo, monospace; }
      .description { margin: 10px 0 0; color: var(--muted); font-size: .86rem; }
      .record-options { display: grid; gap: 5px; margin: 12px 0 0; padding: 0; border: 0; }
      .record-options legend { margin-bottom: 4px; color: var(--muted); font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
      .record-option { display: flex; align-items: center; gap: 6px; margin: 0; color: var(--text); font-size: .76rem; font-weight: 400; text-transform: none; letter-spacing: 0; cursor: pointer; }
      .record-option input { width: 14px; min-height: 14px; margin: 0; accent-color: var(--accent); }
      .record-sources { margin: 10px 0 0; color: var(--muted); font-size: .7rem; }
      .record-sources a { color: var(--accent); }
      .column-label { display: block; margin-bottom: 6px; color: var(--muted); font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
      pre { max-height: 130px; overflow: auto; white-space: pre-wrap; overflow-wrap: anywhere; margin: 0; padding: 10px; background: var(--code); border: 1px solid var(--line); border-radius: 5px; color: var(--text); font: .75rem/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; }
      .chat-label { margin-bottom: 6px; }
      .chat-preview { width: 100%; margin-bottom: 12px; padding: 9px; color: #efeff1; background: #18181b; border-radius: 3px; font: 1rem/1.45 "Segoe UI", Arial, sans-serif; overflow-wrap: anywhere; }
      .chat-line { display: block; }
      .chat-icon { display: inline-grid; width: 21px; height: 21px; margin-right: 3px; place-items: center; vertical-align: -4px; border-radius: 3px; color: #fff; }
      .chat-icon svg { width: 16px; height: 16px; fill: currentColor; }
      .chat-icon.bot { background: #51a832; }
      .chat-icon.brand-icon { background: #536ca8; }
      .chat-name { margin-right: 2px; color: #4384e8; font-weight: 700; }
      .chat-message { color: #efeff1; }
      .copy { margin-top: auto; padding: 7px 11px; border: 1px solid var(--line); border-radius: 5px; background: var(--soft); color: var(--text); cursor: pointer; font-weight: 600; }
      .copy:hover { border-color: var(--accent); }
      .copy.copied { color: var(--accent); }
      .copy:disabled { color: var(--muted); cursor: not-allowed; opacity: .65; }
      footer { margin-top: 56px; padding-top: 20px; border-top: 1px solid var(--line); color: var(--muted); text-align: center; font-size: .86rem; }
      @media (max-width: 840px) { header { grid-template-columns: 1fr; gap: 24px; } .setup { max-width: 560px; } }
      @media (max-width: 720px) { nav { margin-bottom: 40px; } .card { grid-template-columns: 1fr; gap: 14px; } .card-output { grid-column: auto; display: flex; } .copy { margin-top: 0; } .shell { width: calc(100% - 20px); padding-top: 18px; } }
    </style>
  </head>
  <body>
    <main class="shell">
      <nav><a class="brand" href="/">MCSR <span>Stats</span></a><div class="nav-actions"><button class="theme-toggle" id="theme-toggle" type="button"><span class="material-symbols-outlined" aria-hidden="true">dark_mode</span><span class="theme-label">Dark</span></button></div></nav>
      <header>
        <div class="header-copy">
          <div class="eyebrow">Chat bot commands</div>
          <h1>MCSR Stats commands</h1>
          <p>Enter your Minecraft username, then copy any command straight into your Fossabot dashboard.</p>
        </div>
        <section class="setup" aria-label="Command settings">
          <label for="username">Minecraft username</label>
          <input id="username" value="Feinberg" autocomplete="off" spellcheck="false" />
        </section>
      </header>
      <div class="summary"><h2>Available commands</h2><span id="count"></span></div>
      <section id="commands" aria-live="polite"></section>
      <footer>MCSR Stats · <a href="/">Home</a> · <a href="https://github.com/memerson12/MCSR-Ranked-Matches-Today" target="_blank" rel="noreferrer">GitHub</a> · Discord: memerson_</footer>
    </main>
    <script src="/command-data.js"></script>
    <script>
      const usernameInput = document.querySelector("#username");
      const container = document.querySelector("#commands");
      const themeButton = document.querySelector("#theme-toggle");
      const themeIcon = themeButton.querySelector(".material-symbols-outlined");
      const themeLabel = themeButton.querySelector(".theme-label");
      const selectedRecords = new Set(
        window.COMMAND_CATALOG.flatMap((item) =>
          (item.records || []).filter((record) => record.default).map((record) => record.id)
        )
      );

      const savedTheme = localStorage.getItem("theme");
      const initialTheme = savedTheme || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      function applyTheme(theme) {
        const normalized = theme === "dark" ? "dark" : "light";
        document.documentElement.dataset.theme = normalized;
        themeIcon.textContent = normalized === "dark" ? "light_mode" : "dark_mode";
        themeLabel.textContent = normalized === "dark" ? "Light" : "Dark";
      }
      applyTheme(initialTheme);

      function selectedRecordsFor(item) {
        return (item.records || []).filter((record) => selectedRecords.has(record.id));
      }

      function commandFor(item, username) {
        if (item.records) {
          const records = selectedRecordsFor(item);
          if (!records.length) return "$(eval `Select at least one world record`)";
          const output = records.map((record) =>
            `${record.label} - \${r['${record.key}']['igt']} by \${r['${record.key}']['runner']}`
          ).join(" | ");
          return `$(eval r=$(customapi https://mcsr-stats.memerson.xyz/api/world_records); \`${output}\`)`;
        }
        return item.commands.fossabot.replaceAll("{{username}}", username);
      }

      function exampleFor(item, username) {
        if (item.records) {
          const records = selectedRecordsFor(item);
          return records.length
            ? records.map((record) => `${record.label} - ${record.sample}`).join(" | ")
            : "Select at least one world record";
        }
        return item.example.replaceAll("{{username}}", username);
      }

      function optionsFor(item) {
        if (!item.records) return "";
        const options = item.records.map((record) => `<label class="record-option">
          <input type="checkbox" data-record="${record.id}" ${selectedRecords.has(record.id) ? "checked" : ""} /> ${record.label}
        </label>`).join("");
        const sources = item.sources.map((source) => `<a href="${source.url}" target="_blank" rel="noreferrer">${source.label}</a>`).join(" and ");
        return `<fieldset class="record-options"><legend>Records to show</legend>${options}</fieldset>
          <p class="record-sources">Records come from the ${sources}.</p>`;
      }

      function render() {
        const username = usernameInput.value.trim();
        document.querySelector("#count").textContent = `${window.COMMAND_CATALOG.length} Fossabot commands`;
        const groups = ["Ranked", "Draftout", "Misc"];
        container.innerHTML = groups.map((group) => {
          const items = window.COMMAND_CATALOG.filter((item) => item.category === group);
          if (!items.length) return "";
          const cards = items.map((item) => `<article class="card">
              <div class="card-info">
                <div class="card-top"><h3>${item.name}</h3><span class="trigger">${item.trigger}</span></div>
                <p class="description">${item.description}</p>
                ${optionsFor(item)}
              </div>
              <div class="card-command"><span class="column-label">Command</span><pre><code data-command-code="${item.id}"></code></pre></div>
              <div class="card-output">
                <span class="column-label chat-label">Example output</span>
                <div class="chat-preview">
                  <div class="chat-line">
                    <span class="chat-icon bot" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M9 2h6v2h-2v2h5a3 3 0 0 1 3 3v9a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V9a3 3 0 0 1 3-3h5V4H9V2Zm-3 7v8h12V9H6Zm2 2h3v3H8v-3Zm5 0h3v3h-3v-3Z"/></svg></span>
                    <span class="chat-icon brand-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3 17 8 7l4 6 3-4 6 8v3H3v-3Z"/></svg></span>
                    <span class="chat-name">Fossabot:</span>
                    <span class="chat-message" data-command-example="${item.id}"></span>
                  </div>
                </div>
                <button class="copy" data-command="${item.id}">Copy command</button>
              </div>
            </article>`).join("");
          return `<section class="command-group" aria-labelledby="group-${group.toLowerCase()}">
            <h2 class="group-heading" id="group-${group.toLowerCase()}">${group} <span class="group-count">${items.length}</span></h2>
            <div class="grid">${cards}</div>
          </section>`;
        }).join("");
        window.COMMAND_CATALOG.forEach((item) => {
          container.querySelector(`[data-command-code="${item.id}"]`).textContent = commandFor(item, username);
          container.querySelector(`[data-command-example="${item.id}"]`).textContent = exampleFor(item, username);
        });
      }

      themeButton.addEventListener("click", () => {
        const theme = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
        localStorage.setItem("theme", theme);
        applyTheme(theme);
      });
      addEventListener("storage", (event) => { if (event.key === "theme" && event.newValue) applyTheme(event.newValue); });

      usernameInput.addEventListener("input", render);
      container.addEventListener("change", (event) => {
        const checkbox = event.target.closest("[data-record]");
        if (!checkbox) return;
        if (checkbox.checked) selectedRecords.add(checkbox.dataset.record);
        else selectedRecords.delete(checkbox.dataset.record);
        render();
      });
      container.addEventListener("click", async (event) => {
        const button = event.target.closest(".copy");
        if (!button) return;
        const item = window.COMMAND_CATALOG.find((entry) => entry.id === button.dataset.command);
        try {
          await navigator.clipboard.writeText(commandFor(item, usernameInput.value.trim()));
          button.textContent = "Copied!";
          button.classList.add("copied");
          setTimeout(() => { button.textContent = "Copy command"; button.classList.remove("copied"); }, 1600);
        } catch (_) {
          button.textContent = "Copy failed";
        }
      });
      render();
    </script>
  </body>
</html>
