<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Draftout Widget Config</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,500,0,0"
    />
    <style>
      :root {
        --bg: #f6f8fb;
        --panel: #ffffff;
        --line: #d8e0ea;
        --text: #111827;
        --muted: #617084;
        --accent: #1976d2;
        --input: #ffffff;
        --segment-active-bg: #e7f1ff;
        --segment-active-text: #0f4f92;
        --preview-a: #bcc7d4;
        --preview-bg: #d9e1ea;
      }

      html[data-theme="dark"] {
        --bg: #0d1117;
        --panel: #151b23;
        --line: #303946;
        --text: #eef2f7;
        --muted: #99a4b2;
        --accent: #58d5e8;
        --input: #0f141b;
        --segment-active-bg: rgba(88, 213, 232, 0.16);
        --segment-active-text: #8ee7f3;
        --preview-a: #2b3643;
        --preview-bg: #111820;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      main {
        display: flex;
        min-height: calc(100vh - 64px);
        flex-direction: column;
        width: min(1120px, calc(100% - 32px));
        margin: 32px auto;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 28px;
        line-height: 1.15;
      }

      .header {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 16px;
      }

      .subtitle {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 14px;
      }

      .layout {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 18px;
        align-items: start;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
      }

      .field {
        display: grid;
        gap: 7px;
        margin-bottom: 16px;
      }

      label,
      legend {
        color: var(--text);
        font-size: 13px;
        font-weight: 760;
      }

      input {
        width: 100%;
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--input);
        padding: 8px 10px;
        color: var(--text);
        font: inherit;
      }

      input[type="color"] {
        padding: 3px;
      }

      fieldset {
        margin: 0 0 16px;
        padding: 0;
        border: 0;
      }

      .segments {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 7px;
      }

      .segment input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .segment span {
        display: grid;
        min-height: 38px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 7px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
      }

      .segment input:checked + span {
        border-color: var(--accent);
        background: var(--segment-active-bg);
        color: var(--segment-active-text);
      }

      .url-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        margin-top: 16px;
      }

      button {
        min-height: 38px;
        border: 1px solid var(--accent);
        border-radius: 7px;
        background: var(--accent);
        color: #fff;
        padding: 0 14px;
        font: inherit;
        font-size: 13px;
        font-weight: 850;
        cursor: pointer;
      }

      .preview-shell {
        min-height: 360px;
        background:
          linear-gradient(45deg, var(--preview-a) 25%, transparent 25%),
          linear-gradient(-45deg, var(--preview-a) 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, var(--preview-a) 75%),
          linear-gradient(-45deg, transparent 75%, var(--preview-a) 75%);
        background-color: var(--preview-bg);
        background-position: 0 0, 0 12px, 12px -12px, -12px 0;
        background-size: 24px 24px;
        border: 1px solid var(--line);
        border-radius: 8px;
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      iframe {
        width: 520px;
        height: 300px;
        border: 0;
      }

      .hint {
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .obs-size {
        display: grid;
        gap: 3px;
        margin-top: 14px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--input);
        padding: 10px;
      }

      .obs-size-title {
        color: var(--muted);
        font-size: 11px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .obs-size-value {
        color: var(--text);
        font-size: 15px;
        font-weight: 850;
      }

      .theme-toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        color: var(--text);
        padding: 0 12px;
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
      }

      .material-symbols-outlined {
        display: inline-block;
        font-family: "Material Symbols Outlined";
        font-feature-settings: "liga";
        font-style: normal;
        font-weight: normal;
        letter-spacing: normal;
        line-height: 1;
        text-transform: none;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-smoothing: antialiased;
      }

      .theme-toggle .icon {
        width: 18px;
        font-size: 18px;
        text-align: center;
      }

      .label-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .help {
        position: relative;
        display: inline-grid;
        width: 17px;
        height: 17px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 50%;
        background: var(--input);
        color: var(--muted);
        font-size: 15px;
        line-height: 1;
        cursor: help;
      }

      .help::after {
        content: attr(data-tooltip);
        position: absolute;
        left: 50%;
        bottom: calc(100% + 8px);
        z-index: 2;
        width: 230px;
        transform: translateX(-50%);
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--panel);
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.18);
        color: var(--text);
        padding: 8px 9px;
        font-size: 12px;
        font-weight: 650;
        line-height: 1.35;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.12s ease;
      }

      .help:hover::after,
      .help:focus-visible::after {
        opacity: 1;
      }

      .footer {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: auto;
        padding-top: 32px;
        color: var(--muted);
        font-size: 13px;
      }

      .footer a {
        color: var(--accent);
        font-weight: 750;
        text-decoration: none;
      }

      .footer a:hover,
      .footer a:focus-visible {
        text-decoration: underline;
      }

      @media (max-width: 860px) {
        .header {
          align-items: stretch;
          flex-direction: column;
        }

        .theme-toggle {
          justify-content: center;
        }

        .help::after {
          left: 0;
          transform: none;
        }

        .layout {
          grid-template-columns: 1fr;
        }

        iframe {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="header">
        <div>
          <h1>Draftout OBS Widget</h1>
          <p class="subtitle">Generate a browser-source URL for current Draftout session stats.</p>
        </div>
        <button id="themeToggle" class="theme-toggle" type="button">
          <span class="material-symbols-outlined icon" aria-hidden="true">dark_mode</span>
          <span id="themeLabel">Dark</span>
        </button>
      </div>

      <div class="layout">
        <section class="panel">
          <div class="field">
            <label for="username">Username</label>
            <input id="username" value="Feinberg" autocomplete="off" />
          </div>

          <fieldset>
            <legend>Mode</legend>
            <div class="segments">
              <label class="segment">
                <input type="radio" name="mode" value="compact" checked />
                <span>Compact</span>
              </label>
              <label class="segment">
                <input type="radio" name="mode" value="expanded" />
                <span>Expanded</span>
              </label>
            </div>
          </fieldset>

          <div class="field">
            <div class="label-row">
              <label for="gapHours">Session gap hours</label>
              <span
                class="help"
                tabindex="0"
                role="tooltip"
                data-tooltip="How long a player can go without a completed match before the widget starts a new session."
                >help</span
              >
            </div>
            <input id="gapHours" type="number" min="0.25" step="0.25" value="6" />
          </div>

          <div class="field">
            <div class="label-row">
              <label for="refreshSeconds">Refresh seconds</label>
              <span
                class="help"
                tabindex="0"
                role="tooltip"
                data-tooltip="How often the OBS overlay asks this server for fresh Draftout stats."
                >help</span
              >
            </div>
            <input id="refreshSeconds" type="number" min="5" step="1" value="30" />
          </div>

          <div class="field">
            <label for="accent">Accent color</label>
            <input id="accent" type="color" value="#58d5e8" />
          </div>

          <div class="url-row">
            <input id="url" readonly />
            <button id="copy" type="button">Copy</button>
          </div>
          <div class="obs-size">
            <div class="obs-size-title">OBS browser source size</div>
            <div id="obsSize" class="obs-size-value">380 x 82</div>
          </div>
          <div id="copyStatus" class="hint">Use this URL as an OBS browser source.</div>
        </section>

        <section>
          <div class="preview-shell">
            <iframe id="preview" title="Draftout widget preview"></iframe>
          </div>
          <div class="hint">Preview uses the same URL generated for OBS.</div>
        </section>
      </div>

      <footer class="footer">
        <a
          href="https://github.com/memerson12/MCSR-Ranked-Matches-Today"
          target="_blank"
          rel="noreferrer"
          >GitHub</a
        >
        <span>◦</span>
        <span>Discord: memerson_</span>
      </footer>
    </main>

    <script>
      const controls = {
        username: document.getElementById("username"),
        gapHours: document.getElementById("gapHours"),
        refreshSeconds: document.getElementById("refreshSeconds"),
        accent: document.getElementById("accent"),
        url: document.getElementById("url"),
        preview: document.getElementById("preview"),
        copy: document.getElementById("copy"),
        copyStatus: document.getElementById("copyStatus"),
        obsSize: document.getElementById("obsSize"),
        themeToggle: document.getElementById("themeToggle"),
        themeLabel: document.getElementById("themeLabel"),
      };

      applyTheme(localStorage.getItem("draftoutWidgetConfigTheme") || "light");

      document
        .querySelectorAll("input")
        .forEach((input) => input.addEventListener("input", update));
      document
        .querySelectorAll('input[name="mode"]')
        .forEach((input) => input.addEventListener("change", update));
      controls.copy.addEventListener("click", copyUrl);
      controls.themeToggle.addEventListener("click", toggleTheme);

      update();

      function update() {
        const mode = document.querySelector('input[name="mode"]:checked').value;
        const url = buildWidgetUrl();
        controls.url.value = url;
        controls.preview.src = url;
        controls.obsSize.textContent =
          mode === "expanded" ? "430 x 222" : "380 x 82";
      }

      function buildWidgetUrl() {
        const params = new URLSearchParams({
          username: controls.username.value.trim(),
          mode: document.querySelector('input[name="mode"]:checked').value,
          gapHours: positiveNumber(controls.gapHours.value, 6),
          refreshSeconds: positiveNumber(controls.refreshSeconds.value, 30),
          accent: controls.accent.value,
        });

        return `${window.location.origin}/draftout-widget.html?${params.toString()}`;
      }

      async function copyUrl() {
        try {
          await navigator.clipboard.writeText(controls.url.value);
          controls.copyStatus.textContent = "Copied.";
        } catch {
          controls.url.select();
          document.execCommand("copy");
          controls.copyStatus.textContent = "Copied.";
        }
      }

      function positiveNumber(value, fallback) {
        const parsed = Number(value);
        return Number.isFinite(parsed) && parsed > 0 ? String(parsed) : String(fallback);
      }

      function toggleTheme() {
        const currentTheme =
          document.documentElement.dataset.theme === "dark" ? "dark" : "light";
        applyTheme(currentTheme === "dark" ? "light" : "dark");
      }

      function applyTheme(theme) {
        const normalizedTheme = theme === "dark" ? "dark" : "light";
        document.documentElement.dataset.theme = normalizedTheme;
        localStorage.setItem("draftoutWidgetConfigTheme", normalizedTheme);
        controls.themeLabel.textContent =
          normalizedTheme === "dark" ? "Light" : "Dark";
        controls.themeToggle.querySelector(".icon").textContent =
          normalizedTheme === "dark" ? "light_mode" : "dark_mode";
      }
    </script>
  </body>
</html>
